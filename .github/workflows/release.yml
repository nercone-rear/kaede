name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-openssl:
    runs-on: ubuntu-latest
    if: "!github.event.release.prerelease"

    outputs:
      version: ${{ steps.openssl-version.outputs.version }}
      cache-key: ${{ steps.openssl-version.outputs.cache-key }}

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Resolve latest OpenSSL 3.x version
        id: openssl-version
        run: |
          VERSION=$(gh api repos/openssl/openssl/releases --paginate -q '[.[] | select(.prerelease == false and .draft == false) | select(.tag_name | test("^openssl-3\\.")) | .tag_name] | first // empty | ltrimstr("openssl-")' | head -1)
          echo "Resolved OpenSSL ${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "cache-key=openssl-${VERSION}-${{ runner.os }}-v3" >> $GITHUB_OUTPUT

      - name: Cache OpenSSL build
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: ~/openssl-3
          key: ${{ steps.openssl-version.outputs.cache-key }}

      - name: Build OpenSSL ${{ steps.openssl-version.outputs.version }}
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          VERSION="${{ steps.openssl-version.outputs.version }}"
          sudo apt-get update -q
          sudo apt-get install -y build-essential
          curl -fsSL "https://github.com/openssl/openssl/releases/download/openssl-${VERSION}/openssl-${VERSION}.tar.gz" \
            | tar xz
          cd "openssl-${VERSION}"
          ./Configure --prefix="$HOME/openssl-3" --openssldir="$HOME/openssl-3" --libdir=lib shared no-docs
          make -j$(nproc)
          make install_sw

  test-linux:
    needs: build-openssl
    runs-on: ubuntu-latest
    if: "!github.event.release.prerelease"
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Restore OpenSSL build cache
        uses: actions/cache/restore@v4
        with:
          path: ~/openssl-3
          key: ${{ needs.build-openssl.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Register OpenSSL and Set KAEDE_OPENSSL
        run: |
          LIBDIR="$HOME/openssl-3/lib"
          echo "Using OpenSSL lib dir: ${LIBDIR}"
          test -d "${LIBDIR}" || { echo "lib directory not found: ${LIBDIR}"; exit 1; }
          echo "${LIBDIR}" | sudo tee /etc/ld.so.conf.d/openssl35.conf
          sudo ldconfig
          echo "KAEDE_OPENSSL=${LIBDIR}" >> $GITHUB_ENV
          echo "SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt" >> $GITHUB_ENV

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest --tb=short -v

  test-macos:
    runs-on: macos-latest
    if: "!github.event.release.prerelease"
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSSL via Homebrew
        run: brew install openssl@3

      - name: Set KAEDE_OPENSSL
        run: |
          LIBDIR="$(brew --prefix openssl@3)/lib"
          echo "Using OpenSSL lib dir: ${LIBDIR}"
          test -d "${LIBDIR}" || { echo "lib directory not found: ${LIBDIR}"; exit 1; }
          echo "KAEDE_OPENSSL=${LIBDIR}" >> $GITHUB_ENV

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest --tb=short -v

  update:
    needs: [test-linux, test-macos]
    runs-on: ubuntu-latest
    if: "!github.event.release.prerelease"
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update version in pyproject.toml
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml
          echo "Updated pyproject.toml for releasing [Kaede ${VERSION}]"

      - name: Commit and push version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add pyproject.toml
          if git diff --cached --quiet; then
            echo "pyproject.toml already at ${{ github.event.release.tag_name }}, skipping commit"
          else
            git commit -m "Release ${{ github.event.release.tag_name }}"
            git push origin main
          fi

  build:
    needs: update
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
